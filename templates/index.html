<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>彩券量化分析平台</title>
</head>

<body>

<h2>🎯 彩券量化分析平台</h2>

<select id="count">
<option value="1">1</option>
<option value="2">2</option>
<option value="3">3</option>
<option value="4">4</option>
<option value="5">5</option>
<option value="6">6</option>
<option value="7">7</option>
<option value="8">8</option>
<option value="9">9</option>
<option value="10">10</option>
</select>

<button onclick="pick()">智慧選號</button>

<h3 id="result"></h3>

<button onclick="compare()">模型比較</button>

<pre id="compare_result"></pre>

<script>

function pick(){

    let count=document.getElementById("count").value;

    fetch("/pick",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            count:count
        })
    })
    .then(r=>r.json())
    .then(data=>{

        document.getElementById("result").innerHTML=
            "推薦號碼："+data.numbers.join(", ");

    });

}

function compare(){

    let count=document.getElementById("count").value;

    fetch("/compare?k="+count)
    .then(r=>r.json())
    .then(data=>{

        document.getElementById("compare_result").innerHTML=
`
隨機模型：${data.random}
熱號模型：${data.hot}
動量模型：${data.momentum}
多因子模型：${data.ensemble}
`;

    });

}

</script>

</body>
</html>
