<!DOCTYPE html>

<html>

<head>

<meta charset="utf-8">

<title>Bingo穩定版</title>

<style>

body{
    background:#111;
    color:white;
    font-family:Arial;
    text-align:center;
}

button{

    padding:10px 20px;

    font-size:18px;

    margin:10px;

    border:none;

    border-radius:10px;

    cursor:pointer;
}

select{

    font-size:20px;

    padding:5px;
}

.ball{

    display:inline-block;

    width:42px;
    height:42px;

    line-height:42px;

    border-radius:50%;

    margin:4px;

    background:#ddd;

    color:black;

    font-weight:bold;
}

.hit{

    background:red;
    color:white;
}

</style>

</head>

<body>

<h1>🎯 Bingo穩定版</h1>

<select id="count">

<option value="1">1星</option>
<option value="2">2星</option>
<option value="3">3星</option>
<option value="4">4星</option>
<option value="5">5星</option>
<option value="6" selected>6星</option>
<option value="7">7星</option>
<option value="8">8星</option>
<option value="9">9星</option>
<option value="10">10星</option>

</select>

<br>

<button onclick="pick()">
智慧選號
</button>

<button onclick="startMonitor()">
開始監控
</button>

<h2 id="my_numbers"></h2>

<h3 id="issue"></h3>

<h3 id="time"></h3>

<div id="live"></div>

<h2 id="hit"></h2>

<script>

let myNums=[];

let started=false;


// ====================================
// 智慧選號
// ====================================

function pick(){

    let count=parseInt(
        document.getElementById("count").value
    );

    fetch("/pick",{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify({
            count:count
        })

    })

    .then(r=>r.json())

    .then(data=>{

        myNums=data.numbers;

        document.getElementById("my_numbers").innerHTML=
            "你的號碼："+myNums.join(", ");

    });

}


// ====================================
// LIVE監控
// ====================================

function loadLive(){

    let url =
    "https://www.taiwanlottery.com/lotto/result/bingo_bingo";

    let proxy =
    "https://api.allorigins.win/raw?url=";

    fetch(
        proxy + encodeURIComponent(url)
    )

    .then(r=>r.text())

    .then(html=>{

        // 期數

        let issue="未知";

        let m =
        html.match(/第(\d+)期/);

        if(m){

            issue=m[1];
        }

        // 開獎號碼

        let nums=[];

        let matches =
        [...html.matchAll(/>(\d{2})</g)];

        matches.forEach(x=>{

            let n=parseInt(x[1]);

            if(
                n>=1 &&
                n<=80 &&
                !nums.includes(n)
            ){
                nums.push(n);
            }

        });

        nums=nums.slice(0,20);

        // 顯示

        document.getElementById("issue").innerHTML=
        "期數："+issue+" (live)";

        let now=new Date();

        document.getElementById("time").innerHTML=
        "時間："+now.toLocaleTimeString();

        let htmlBalls="";

        let hit=[];

        nums.forEach(n=>{

            if(myNums.includes(n)){

                htmlBalls +=
                `<div class="ball hit">${n}</div>`;

                hit.push(n);

            }else{

                htmlBalls +=
                `<div class="ball">${n}</div>`;
            }

        });

        document.getElementById("live").innerHTML=
        htmlBalls;

        document.getElementById("hit").innerHTML=
        "命中："+hit.length+
        " 個 → "+hit.join(", ");

    })

    .catch(err=>{

        console.log(err);

        document.getElementById("issue").innerHTML=
        "LIVE抓取失敗";

    });

}


// ====================================
// 開始監控
// ====================================

function startMonitor(){

    loadLive();

    if(!started){

        setInterval(loadLive,30000);

        started=true;
    }

}

</script>

</body>

</html>
