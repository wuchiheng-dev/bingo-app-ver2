<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>賓果賓果統計選號</title>

<link rel="manifest" href="/manifest.json">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f0f0f;
    color: white;
    text-align: center;
}

/* 標題 */
h2 {
    margin: 10px 0;
    color: #ffb300;
}

/* 控制區 */
.control {
    padding: 10px;
}

input {
    width: 60px;
    font-size: 16px;
    text-align: center;
}

/* 按鈕 */
button {
    padding: 12px;
    margin: 8px;
    width: 90%;
    font-size: 16px;
    border: none;
    border-radius: 8px;
    background: #ff9800;
    color: white;
}

/* 號碼球 */
.grid {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: 6px;
    padding: 10px;
}

.num {
    background: #2c2c2c;
    padding: 10px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 14px;
}

.selected {
    background: #ff9800;
}

/* 結果 */
.result {
    margin: 10px;
    font-size: 18px;
    color: #00e676;
}

/* loading */
#status {
    font-size: 14px;
    color: #aaa;
}
</style>
</head>

<body>

<h2>🎯 賓果賓果統計選號</h2>

<div class="control">
    <label>選號數量（1~10）</label><br>
    <input type="number" id="count" value="5" min="1" max="10">
</div>

<button onclick="smartPick()">⚡ 統計選號（抓近200期）</button>

<div id="status"></div>

<div class="grid" id="grid"></div>

<div class="result" id="result"></div>

<script>

// =========================
// 建立 1~80 號碼球
// =========================
let selected = new Set();

const grid = document.getElementById("grid");

for (let i = 1; i <= 80; i++) {
    let div = document.createElement("div");
    div.className = "num";
    div.innerText = i;

    div.onclick = () => {
        if (selected.has(i)) {
            selected.delete(i);
            div.classList.remove("selected");
        } else {
            if (selected.size >= 10) return;
            selected.add(i);
            div.classList.add("selected");
        }
    };

    grid.appendChild(div);
}

// =========================
// 統計選號（呼叫後端）
// =========================
function smartPick() {
    let count = document.getElementById("count").value;

    document.getElementById("status").innerText = "📡 正在抓取近200期資料分析中...";

    fetch("/pick", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ count: count })
    })
    .then(res => res.json())
    .then(data => {

        // 清除舊選擇
        selected.clear();
        document.querySelectorAll(".num").forEach(n => {
            n.classList.remove("selected");
        });

        // 套用新選號
        data.forEach(n => {
            selected.add(n);
            document.querySelectorAll(".num")[n - 1].classList.add("selected");
        });

        document.getElementById("status").innerText = "✅ 統計選號完成";
        document.getElementById("result").innerText =
            "推薦號碼：" + data.join(", ");
    })
    .catch(err => {
        document.getElementById("status").innerText = "❌ 取得資料失敗";
        console.log(err);
    });
}

// =========================
// PWA（離線支援）
// =========================
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("/static/sw.js");
}

</script>

</body>
</html>
